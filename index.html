<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的閱讀護照 - 毛毛蟲蛻變之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); }
        .stage-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active-stage { border: 4px solid #10b981; transform: scale(1.05); background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } }
        .progress-fill { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans pb-12">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-green-800 mb-2">📖 學生閱讀護照</h1>
            <p class="text-green-600 font-medium">看見知識的力量，見證你的蛻變</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div id="stage1" class="stage-card bg-white/50 p-4 rounded-2xl text-center">
                <div class="text-4xl mb-2">🥚</div>
                <h3 class="font-bold text-gray-700">卵期</h3>
                <p class="text-xs text-gray-500">0-10 本</p>
            </div>
            <div id="stage2" class="stage-card bg-white/50 p-4 rounded-2xl text-center">
                <div class="text-4xl mb-2">🐛</div>
                <h3 class="font-bold text-gray-700">幼蟲期</h3>
                <p class="text-xs text-gray-500">11-30 本</p>
            </div>
            <div id="stage3" class="stage-card bg-white/50 p-4 rounded-2xl text-center">
                <div class="text-4xl mb-2">🥜</div>
                <h3 class="font-bold text-gray-700">蛹期</h3>
                <p class="text-xs text-gray-500">31-60 本</p>
            </div>
            <div id="stage4" class="stage-card bg-white/50 p-4 rounded-2xl text-center">
                <div class="text-4xl mb-2">🦋</div>
                <h3 class="font-bold text-gray-700">成蟲期</h3>
                <p class="text-xs text-gray-500">60+ 本</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10">
            <div class="flex justify-between items-end mb-2">
                <span id="currentStatusText" class="text-sm font-bold text-green-700">正在努力萌芽中...</span>
                <span class="text-sm text-gray-400">已過審本數：<b id="passCount" class="text-green-600 text-lg">0</b></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div id="progressBar" class="progress-fill bg-green-500 h-full w-0"></div>
            </div>
        </div>

        <section class="bg-white p-8 rounded-3xl shadow-xl mb-12 border-t-8 border-green-500">
            <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">✍️ 閱讀打卡</h2>
            <form id="readingForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="text" id="class" placeholder="班級 (如: 301)" class="border-2 border-gray-100 p-3 rounded-xl focus:border-green-400 outline-none transition" required>
                <input type="text" id="name" placeholder="姓名" class="border-2 border-gray-100 p-3 rounded-xl focus:border-green-400 outline-none transition" required>
                <input type="text" id="book" placeholder="書名" class="border-2 border-gray-100 p-3 rounded-xl focus:border-green-400 outline-none transition" required>
                <input type="text" id="author" placeholder="作者" class="border-2 border-gray-100 p-3 rounded-xl focus:border-green-400 outline-none transition" required>
                <input type="text" id="publisher" placeholder="出版社" class="border-2 border-gray-100 p-3 rounded-xl focus:border-green-400 outline-none transition" required>
                <div class="md:col-span-2">
                    <textarea id="content" placeholder="我的閱讀心得 (至少100字以上)..." class="w-full border-2 border-gray-100 p-4 rounded-xl h-40 focus:border-green-400 outline-none transition" required minlength="100"></textarea>
                    <p id="charCount" class="text-right text-xs text-gray-400 mt-1">目前字數：0</p>
                </div>
                <button type="submit" id="submitBtn" class="md:col-span-2 bg-green-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-green-700 transform hover:-translate-y-1 transition shadow-lg">提交心得並等待審核</button>
            </form>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-md h-full">
                    <h2 class="text-xl font-bold mb-4 text-blue-800">🏆 蛻變英雄榜</h2>
                    <div id="leaderboard" class="space-y-4 text-sm">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">📚 我的閱讀歷程記錄</h2>
                    <div id="historyList" class="space-y-4">
                        <p class="text-gray-400 text-center py-8">尚未輸入資料或連線中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzD6N95shG58xFsoHnhWuubhU4qEKvCK7DcfK6r-iNKqKQwL5p-6lYe8hhdLrpJuJmdmQ/exec'; 

        // 輔助：隱藏姓名中間字
        function maskName(name) {
            if (!name) return "";
            if (name.length <= 2) return name[0] + "o";
            return name[0] + "o" + name[name.length - 1];
        }

        // 字數即時統計
        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('charCount').innerText = `目前字數：${this.value.length}`;
            if(this.value.length >= 100) this.classList.add('border-green-200');
        });

        // 提交心得
        document.getElementById('readingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "傳送中...";

            const data = {
                action: "add",
                class: document.getElementById('class').value,
                name: document.getElementById('name').value,
                book: document.getElementById('book').value,
                author: document.getElementById('author').value,
                publisher: document.getElementById('publisher').value,
                content: document.getElementById('content').value
            };

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("提交成功！老師審核通過後會計入排行榜喔！");
                location.reload();
            } catch (err) {
                alert("傳送失敗，請檢查網路連線");
                btn.disabled = false; btn.innerText = "重新提交";
            }
        };

        // 修改心得
        async function editRecord(ts, oldBook, oldContent) {
            const newBook = prompt("請輸入正確書名：", oldBook);
            const newContent = prompt("請輸入修正後的心得 (需滿100字)：", oldContent);
            
            if (newBook && newContent && newContent.length >= 100) {
                if(!confirm("確定要修改嗎？修改後狀態將重新設為「待審核」。")) return;
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "edit", timestamp: ts, book: newBook, content: newContent })
                });
                alert("資料已更新！");
                location.reload();
            } else if (newContent && newContent.length < 100) {
                alert("修改失敗：心得字數不足100字！");
            }
        }

        // 載入並更新畫面
        async function init() {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            
            // 1. 處理個人統計與歷程 (以最後一次填寫的姓名班級為準進行過濾，此處採簡單顯示全部)
            const approvedData = data.filter(d => d.status === "已通過");
            
            // 2. 更新排行榜
            const stats = approvedData.reduce((acc, curr) => {
                const key = `${curr.class}_${curr.name}`;
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});

            const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.slice(0,10).map(([key, count], i) => {
                const [cls, name] = key.split('_');
                let icon = count > 60 ? "🦋" : count > 30 ? "🥜" : count > 10 ? "🐛" : "🥚";
                return `
                    <div class="flex items-center justify-between p-2 border-b border-gray-50">
                        <span class="font-bold text-gray-400 w-6">${i+1}</span>
                        <span class="flex-1 text-gray-600">${cls} ${maskName(name)}</span>
                        <span class="text-xl">${icon}</span>
                    </div>`;
            }).join('');

            // 3. 渲染歷程 (包含修改功能)
            const historyHtml = data.slice().reverse().map(d => `
                <div class="border-2 border-gray-50 p-4 rounded-xl relative hover:border-green-100 transition">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-gray-800">📖 ${d.booktitle}</h4>
                        <span class="text-[10px] px-2 py-1 rounded-full ${d.status === '已通過' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">
                            ${d.status}
                        </span>
                    </div>
                    <p class="text-gray-500 text-xs mb-3 leading-relaxed">${d.content.substring(0, 100)}...</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-300">${new Date(d.timestamp).toLocaleDateString()}</span>
                        <button onclick="editRecord('${d.timestamp}', '${d.booktitle}', \`${d.content}\`)" class="text-blue-400 text-xs font-bold hover:text-blue-600">📝 修改心得</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('historyList').innerHTML = historyHtml || '<p class="text-center text-gray-400">尚無紀錄</p>';

            // 4. 更新進度條與階段視覺 (示例：以排行榜第一名為視覺範例或引導)
            // 這裡通常會抓取「當前登入者」，此處簡化為顯示總體或引導
            const userCount = approvedData.length; // 範例邏輯
            document.getElementById('passCount').innerText = userCount;
            const progressPercent = Math.min((userCount / 60) * 100, 100);
            document.getElementById('progressBar').style.width = progressPercent + "%";
            
            // 點亮階段
            document.querySelectorAll('.stage-card').forEach(el => el.classList.remove('active-stage'));
            if(userCount <= 10) document.getElementById('stage1').classList.add('active-stage');
            else if(userCount <= 30) document.getElementById('stage2').classList.add('active-stage');
            else if(userCount <= 60) document.getElementById('stage3').classList.add('active-stage');
            else document.getElementById('stage4').classList.add('active-stage');
        }

        init();
    </script>
</body>
</html>
